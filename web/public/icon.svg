<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1418"/>
      <stop offset="1" stop-color="#05080a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffd08a"/>
      <stop offset="0.55" stop-color="#ffb454"/>
      <stop offset="1" stop-color="#a86f2c"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#123037"/>
      <stop offset="0.6" stop-color="#0b1c21"/>
      <stop offset="1" stop-color="#060d10"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4fd6c4" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#4fd6c4" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4fd6c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- glass -->
  <circle cx="256" cy="256" r="150" fill="url(#glass)"/>
  <!-- bioluminescent glow rising from the deep -->
  <circle cx="256" cy="340" r="120" fill="url(#glow)"/>
  <!-- horizon line in the glass -->
  <path d="M118 300 Q 256 264 394 300" fill="none" stroke="#4fd6c4" stroke-opacity="0.5" stroke-width="7" stroke-linecap="round"/>
  <!-- top-left glass highlight -->
  <path d="M158 176 Q 208 128 278 136" fill="none" stroke="#eef4f2" stroke-opacity="0.22" stroke-width="14" stroke-linecap="round"/>

  <!-- brass ring -->
  <circle cx="256" cy="256" r="164" fill="none" stroke="url(#ring)" stroke-width="30"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#05080a" stroke-opacity="0.85" stroke-width="4"/>
  <circle cx="256" cy="256" r="179" fill="none" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>
</svg>
